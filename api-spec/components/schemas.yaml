EduVerificationRequest:
  type: object
  additionalProperties: false
  required:
    - applicant
    - consent
  properties:
    clientReferenceId:
      type: string
      minLength: 1
      maxLength: 100
      description: Caller-supplied identifier for correlation and reconciliation.
      example: ext-2025-12-23-0001
    applicant:
      $ref: "#/Applicant"
    consent:
      $ref: "#/ConsentAttestation"

Applicant:
  type: object
  additionalProperties: false
  required:
    - firstName
    - lastName
    - dateOfBirth
  properties:
    firstName:
      type: string
      minLength: 1
      maxLength: 80
      description: Applicant legal first name.
      example: Lynette
    lastName:
      type: string
      minLength: 1
      maxLength: 80
      description: Applicant legal last name.
      example: Oyola
    dateOfBirth:
      type: string
      format: date
      description: Applicant date of birth in ISO 8601 date format.
      example: "1988-10-24"
    ssnLast4:
      type: string
      pattern: "^[0-9]{4}$"
      description: Last four digits of SSN when available.
      example: "4321"

ConsentAttestation:
  type: object
  additionalProperties: false
  required:
    - attested
    - attestedAt
    - purpose
  properties:
    attested:
      type: boolean
      const: true
      description: Must be true to indicate user consent/authorization is on file.
      example: true
    attestedAt:
      type: string
      format: date-time
      description: Timestamp when consent was attested by the caller.
      example: "2025-12-23T11:42:21Z"
    purpose:
      type: string
      minLength: 1
      maxLength: 200
      description: Business/legal purpose for the request.
      example: Medicaid eligibility verification

EduVerificationResponse:
  type: object
  additionalProperties: false
  required:
    - requestId
    - status
    - result
    - transaction
    - schools
  properties:
    requestId:
      type: string
      description: EDU service-generated request identifier for audit and support.
      example: req_20251223_114232_828374364
    status:
      $ref: "#/VerificationStatus"
    result:
      $ref: "#/VerificationResult"
    transaction:
      $ref: "#/TransactionMetadata"
    schools:
      type: array
      description: Matching schools and enrollment snapshots returned by the service.
      items:
        $ref: "#/SchoolSummary"

VerificationStatus:
  type: object
  additionalProperties: false
  required:
    - code
    - severity
    - message
  properties:
    code:
      type: string
      description: Provider status code; "0" indicates successful processing.
      example: "0"
    severity:
      type: string
      enum:
        - info
        - error
      description: Normalized status severity.
      example: info
    message:
      type: string
      description: Human-readable status message.
      example: Successful

VerificationResult:
  type: object
  additionalProperties: false
  required:
    - verified
    - matchFound
    - hasEnrollmentRecords
    - matchedSchoolCount
  properties:
    verified:
      type: boolean
      description: True when verification is confirmed with at least one returned value.
      example: true
    matchFound:
      type: boolean
      description: Whether a matching student record was located.
      example: true
    hasEnrollmentRecords:
      type: boolean
      description: Whether enrollment details are present in the response.
      example: true
    matchedSchoolCount:
      type: integer
      minimum: 0
      description: Number of schools returned in the normalized response.
      example: 1

TransactionMetadata:
  type: object
  additionalProperties: false
  required:
    - transactionId
    - orderId
    - transactionStatus
    - requestedAt
    - respondedAt
    - charges
  properties:
    transactionId:
      type: string
      description: Dependency transaction identifier recorded by the EDU service.
      example: "828374364"
    orderId:
      type: string
      description: Dependency order identifier recorded by the EDU service.
      example: "114694166"
    transactionStatus:
      type: string
      enum:
        - confirmed
        - unable_to_confirm
        - pending
      description: Normalized transaction disposition.
      example: confirmed
    requestedAt:
      type: string
      format: date-time
      description: Time when the dependency request was recorded.
      example: "2025-12-23T11:42:32.636Z"
    respondedAt:
      type: string
      format: date-time
      description: Time when the dependency response was recorded.
      example: "2025-12-23T11:42:32.636Z"
    charges:
      $ref: "#/TransactionCharges"

TransactionCharges:
  type: object
  additionalProperties: false
  required:
    - transactionFee
    - salesTax
    - total
    - currency
  properties:
    transactionFee:
      type: number
      format: double
      minimum: 0
      description: Fee charged for the verification transaction.
      example: 0
    salesTax:
      type: number
      format: double
      minimum: 0
      description: Tax charged for the verification transaction.
      example: 0
    total:
      type: number
      format: double
      minimum: 0
      description: Total amount charged for the transaction.
      example: 0
    currency:
      type: string
      pattern: "^[A-Z]{3}$"
      description: ISO 4217 currency code.
      example: USD

SchoolSummary:
  type: object
  additionalProperties: false
  required:
    - schoolCode
    - officialSchoolName
    - currentEnrollmentStatus
    - enrollmentRecords
  properties:
    schoolCode:
      type: string
      description: Institution code.
      example: "041279"
    officialSchoolName:
      type: string
      description: Official institution name.
      example: Trident University International
    currentEnrollmentStatus:
      type: string
      description: Current enrollment status code.
      example: CC
    enrollmentRecords:
      type: array
      items:
        $ref: "#/EnrollmentRecord"

EnrollmentRecord:
  type: object
  additionalProperties: false
  required:
    - enrollmentStatus
    - termBeginDate
    - termEndDate
  properties:
    enrollmentStatus:
      type: string
      description: Enrollment status for the term record.
      example: "Y"
    termBeginDate:
      type: string
      format: date
      example: "2024-05-31"
    termEndDate:
      type: string
      format: date
      example: "2024-11-19"
    schoolCertifiedOnDate:
      type: string
      format: date
      description: Date the school certified the term details.
      example: "2024-07-16"
    anticipatedGraduationDate:
      type: string
      format: date
      description: Reported anticipated graduation date.
      example: "2025-12-30"
    majorCoursesOfStudy:
      type: array
      items:
        $ref: "#/CourseOfStudy"

CourseOfStudy:
  type: object
  additionalProperties: false
  required:
    - course
  properties:
    course:
      type: string
      description: Course or major title.
      example: Business Administration
    ncesCipCode:
      type: string
      description: NCES Classification of Instructional Programs code.
      example: "450724"

ProblemDetails:
  type: object
  description: RFC 7807 problem details envelope.
  additionalProperties: true
  required:
    - type
    - title
    - status
    - detail
  properties:
    type:
      type: string
      format: uri-reference
      example: https://api.example.gov/problems/invalid-edu-request
    title:
      type: string
      example: Invalid Request
    status:
      type: integer
      minimum: 100
      maximum: 599
      example: 400
    detail:
      type: string
      example: applicant.dateOfBirth must be an ISO 8601 date.
    instance:
      type: string
      format: uri-reference
      example: /v1/edu/requests/req_20251223_114232_828374364
