BadRequestProblem:
  description: Invalid education verification request.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        invalidRequest:
          $ref: ./examples.yaml#/BadRequestProblemExample

UnauthorizedProblem:
  description: Authentication failed.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        unauthorized:
          $ref: ./examples.yaml#/UnauthorizedProblemExample

ForbiddenProblem:
  description: Caller is authenticated but not authorized for this resource.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        forbidden:
          $ref: ./examples.yaml#/ForbiddenProblemExample

TooManyRequestsProblem:
  description: Request rejected due to throttling or protection controls.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        tooManyRequests:
          $ref: ./examples.yaml#/TooManyRequestsProblemExample

BadGatewayProblem:
  description: Upstream education provider failed to process request.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        badGateway:
          $ref: ./examples.yaml#/BadGatewayProblemExample

ServiceUnavailableProblem:
  description: Education verification service is temporarily unavailable.
  content:
    application/problem+json:
      schema:
        $ref: ./schemas.yaml#/ProblemDetails
      examples:
        serviceUnavailable:
          $ref: ./examples.yaml#/ServiceUnavailableProblemExample

