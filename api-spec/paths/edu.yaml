post:
  tags:
    - Education
  summary: Submit an education verification request
  description: >
    Accepts a minimal identity payload and returns the subject's current
    enrollment indicator and normalized enrollment load code.
  operationId: submitEducationVerification
  security:
    - BearerAuth: []
  parameters:
    - name: X-EMMY-Consent-Token
      in: header
      required: true
      description: Consent token required for user-data verification requests.
      schema:
        type: string
        minLength: 1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/requests/edu-verification-request.yaml#/EduVerificationRequest
        examples:
          standard:
            $ref: ../components/examples/requests/edu-verification-request.yaml#/EduVerificationRequestExample
  responses:
    "200":
      description: Education enrollment lookup completed successfully.
      content:
        application/json:
          schema:
            $ref: ../components/models/edu-enrollment.yaml#/EduEnrollment
          examples:
            verified:
              $ref: ../components/examples/responses/edu-enrollment.yaml#/EduEnrollmentExample
    "400":
      $ref: ../components/responses/bad-request-problem.yaml#/BadRequestProblem
    "401":
      $ref: ../components/responses/unauthorized-problem.yaml#/UnauthorizedProblem
    "403":
      $ref: ../components/responses/forbidden-problem.yaml#/ForbiddenProblem
    "429":
      $ref: ../components/responses/too-many-requests-problem.yaml#/TooManyRequestsProblem
    "502":
      $ref: ../components/responses/bad-gateway-problem.yaml#/BadGatewayProblem
    "503":
      $ref: ../components/responses/service-unavailable-problem.yaml#/ServiceUnavailableProblem
