openapi: 3.1.0
info:
  title: Verification Service API - Education
  version: 1.0.0
  summary: Minimal public API contract for education verification.
  description: >
    Public EDU service contract for education verification requests. This contract
    intentionally abstracts dependency-specific integration complexity while preserving
    consent/compliance attestation requirements.
servers:
  - url: https://api.example.gov
    description: Production placeholder
  - url: http://localhost:8000
    description: Local development
tags:
  - name: Education
    description: Education verification operations
paths:
  /v1/edu:
    $ref: ./paths/edu.yaml
components:
