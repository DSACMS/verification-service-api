    ConsentAttestation:
      $ref: ./components/schemas.yaml#/ConsentAttestation
    EduVerificationResponse:
      $ref: ./components/schemas.yaml#/EduVerificationResponse
    VerificationStatus:
      $ref: ./components/schemas.yaml#/VerificationStatus
    VerificationResult:
      $ref: ./components/schemas.yaml#/VerificationResult
    TransactionMetadata:
      $ref: ./components/schemas.yaml#/TransactionMetadata
    TransactionCharges:
      $ref: ./components/schemas.yaml#/TransactionCharges
    SchoolSummary:
      $ref: ./components/schemas.yaml#/SchoolSummary
