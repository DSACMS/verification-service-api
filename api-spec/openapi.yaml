openapi: 3.1.0
info:
  title: Verification Service API - Education
  version: 1.0.0
  summary: Minimal public API contract for education verification.
  description: >
    Public EDU service contract for education verification requests. This contract
    intentionally exposes only the minimal identity inputs needed for an education
    enrollment lookup and the normalized enrollment result.
servers:
  - url: https://api.example.gov
    description: Production placeholder
  - url: http://localhost:8000
    description: Local development
tags:
  - name: Education
    description: Education verification operations
paths:
  /v1/edu:
    $ref: ./paths/edu.yaml
components:
  securitySchemes:
    BearerAuth:
      $ref: ./components/security-schemes.yaml#/BearerAuth
  schemas:
    EduVerificationRequest:
      $ref: ./components/requests/edu-verification-request.yaml#/EduVerificationRequest
    Applicant:
      $ref: ./components/models/applicant.yaml#/Applicant
    EduEnrollment:
      $ref: ./components/models/edu-enrollment.yaml#/EduEnrollment
    ProblemDetails:
      $ref: ./components/models/problem-details.yaml#/ProblemDetails
  responses:
    BadRequestProblem:
      $ref: ./components/responses/bad-request-problem.yaml#/BadRequestProblem
    UnauthorizedProblem:
      $ref: ./components/responses/unauthorized-problem.yaml#/UnauthorizedProblem
    ForbiddenProblem:
      $ref: ./components/responses/forbidden-problem.yaml#/ForbiddenProblem
    TooManyRequestsProblem:
      $ref: ./components/responses/too-many-requests-problem.yaml#/TooManyRequestsProblem
    BadGatewayProblem:
      $ref: ./components/responses/bad-gateway-problem.yaml#/BadGatewayProblem
    ServiceUnavailableProblem:
      $ref: ./components/responses/service-unavailable-problem.yaml#/ServiceUnavailableProblem
  examples:
    EduVerificationRequestExample:
      $ref: ./components/examples/requests/edu-verification-request.yaml#/EduVerificationRequestExample
    EduEnrollmentExample:
      $ref: ./components/examples/responses/edu-enrollment.yaml#/EduEnrollmentExample
    BadRequestProblemExample:
      $ref: ./components/examples/responses/problems/bad-request-problem.yaml#/BadRequestProblemExample
    UnauthorizedProblemExample:
      $ref: ./components/examples/responses/problems/unauthorized-problem.yaml#/UnauthorizedProblemExample
    ForbiddenProblemExample:
      $ref: ./components/examples/responses/problems/forbidden-problem.yaml#/ForbiddenProblemExample
    TooManyRequestsProblemExample:
      $ref: ./components/examples/responses/problems/too-many-requests-problem.yaml#/TooManyRequestsProblemExample
    BadGatewayProblemExample:
      $ref: ./components/examples/responses/problems/bad-gateway-problem.yaml#/BadGatewayProblemExample
    ServiceUnavailableProblemExample:
      $ref: ./components/examples/responses/problems/service-unavailable-problem.yaml#/ServiceUnavailableProblemExample
security:
  - BearerAuth: []
