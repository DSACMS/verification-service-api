openapi: 3.1.0
info:
  title: Verification Service API - Education
  version: 1.0.0
  summary: Minimal public API contract for education verification.
  description: |
    Public EDU service contract for education verification requests. This contract intentionally exposes only the minimal identity inputs needed for an education enrollment lookup and the normalized enrollment result.
servers:
  - url: https://api.example.gov
    description: Production placeholder
  - url: http://localhost:8000
    description: Local development
security:
  - BearerAuth: []
tags:
  - name: Education
    description: Education verification operations
paths:
  /v1/edu:
    post:
      tags:
        - Education
      summary: Submit an education verification request
      description: |
        Accepts a minimal identity payload and returns the subject's current enrollment indicator and normalized enrollment load code.
      operationId: submitEducationVerification
      security:
        - BearerAuth: []
      parameters:
        - name: X-EMMY-Consent-Token
          in: header
          required: true
          description: Consent token required for user-data verification requests.
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EduVerificationRequest'
            examples:
              standard:
                $ref: '#/components/examples/EduVerificationRequestExample'
      responses:
        '200':
          description: Education enrollment lookup completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EduEnrollment'
              examples:
                verified:
                  $ref: '#/components/examples/EduEnrollmentExample'
        '400':
          $ref: '#/components/responses/BadRequestProblem'
        '401':
          $ref: '#/components/responses/UnauthorizedProblem'
        '403':
          $ref: '#/components/responses/ForbiddenProblem'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblem'
        '502':
          $ref: '#/components/responses/BadGatewayProblem'
        '503':
          $ref: '#/components/responses/ServiceUnavailableProblem'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    EduVerificationRequest:
      type: object
      additionalProperties: false
      required:
        - applicant
      properties:
        applicant:
          $ref: '#/components/schemas/Applicant'
    Applicant:
      type: object
      additionalProperties: false
      required:
        - firstName
        - lastName
        - dateOfBirth
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 80
          description: Applicant legal first name.
          example: Lynette
        lastName:
          type: string
          minLength: 1
          maxLength: 80
          description: Applicant legal last name.
          example: Oyola
        middleName:
          type: string
          minLength: 1
          maxLength: 80
          description: Applicant legal middle name when available.
          example: Marie
        dateOfBirth:
          type: string
          format: date
          description: Applicant date of birth in ISO 8601 date format.
          example: '1988-10-24'
        ssn:
          type: string
          pattern: ^[0-9]{9}$
          description: Full Social Security number when available.
          example: '123456789'
    EduEnrollment:
      type: object
      additionalProperties: false
      required:
        - currentlyEnrolled
        - enrollmentStatus
      properties:
        currentlyEnrolled:
          type: string
          enum:
            - 'Y'
            - 'N'
          description: Whether the subject is currently enrolled.
          example: 'Y'
        enrollmentStatus:
          type: string
          enum:
            - F
            - Q
            - H
            - L
          description: |
            Enrollment load code where `F` is full-time, `Q` is three-quarter time, `H` is half-time, and `L` is less than half-time.
          example: F
    ProblemDetails:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          example: https://api.example.gov/problems/invalid-edu-request
        title:
          type: string
          example: Invalid Request
        status:
          type: integer
          minimum: 100
          maximum: 599
          example: 400
        detail:
          type: string
          example: X-EMMY-Consent-Token header is required.
        instance:
          type: string
          example: /v1/edu/requests/req_20251223_114232_828374364
  responses:
    BadRequestProblem:
      description: Invalid education verification request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidRequest:
              $ref: '#/components/examples/BadRequestProblemExample'
    UnauthorizedProblem:
      description: Authentication failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              $ref: '#/components/examples/UnauthorizedProblemExample'
    ForbiddenProblem:
      description: Caller is authenticated but not authorized for this resource.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            forbidden:
              $ref: '#/components/examples/ForbiddenProblemExample'
    TooManyRequestsProblem:
      description: Request rejected due to throttling or protection controls.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            tooManyRequests:
              $ref: '#/components/examples/TooManyRequestsProblemExample'
    BadGatewayProblem:
      description: A downstream dependency failed to process the request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            badGateway:
              $ref: '#/components/examples/BadGatewayProblemExample'
    ServiceUnavailableProblem:
      description: Education verification service is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            serviceUnavailable:
              $ref: '#/components/examples/ServiceUnavailableProblemExample'
  examples:
    EduVerificationRequestExample:
      summary: Minimal canonical request with required consent token header.
      value:
        applicant:
          firstName: Lynette
          lastName: Oyola
          middleName: Marie
          dateOfBirth: '1988-10-24'
          ssn: '123456789'
    EduEnrollmentExample:
      summary: Subject is currently enrolled full-time.
      value:
        currentlyEnrolled: 'Y'
        enrollmentStatus: F
    BadRequestProblemExample:
      summary: Request validation failed.
      value:
        type: https://api.example.gov/problems/invalid-edu-request
        title: Invalid Request
        status: 400
        detail: X-EMMY-Consent-Token header is required.
        instance: /v1/edu/requests/req_20251223_114232_828374364
    UnauthorizedProblemExample:
      summary: Missing or invalid bearer token.
      value:
        type: https://api.example.gov/problems/unauthorized
        title: Unauthorized
        status: 401
        detail: Authentication credentials were missing or invalid.
    ForbiddenProblemExample:
      summary: Authenticated but not allowed to call endpoint.
      value:
        type: https://api.example.gov/problems/forbidden
        title: Forbidden
        status: 403
        detail: The authenticated principal lacks access to this resource.
    TooManyRequestsProblemExample:
      summary: Request rejected by rate limiting or safety controls.
      value:
        type: https://api.example.gov/problems/rate-limited
        title: Too Many Requests
        status: 429
        detail: Too many requests were received. Retry later.
    BadGatewayProblemExample:
      summary: Downstream dependency error.
      value:
        type: https://api.example.gov/problems/dependency-failure
        title: Bad Gateway
        status: 502
        detail: A downstream dependency returned an invalid response.
    ServiceUnavailableProblemExample:
      summary: Service protection controls are open/unavailable.
      value:
        type: https://api.example.gov/problems/service-unavailable
        title: Service Unavailable
        status: 503
        detail: Education verification is temporarily unavailable.
